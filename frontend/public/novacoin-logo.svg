<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Outer rim gradient -->
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="25%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="75%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <!-- Inner coin gradient -->
    <radialGradient id="coinGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="20%" stop-color="#34d399"/>
      <stop offset="55%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </radialGradient>
    <!-- Shine overlay -->
    <radialGradient id="shine" cx="30%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- N letter gradient -->
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <!-- Nova star glow -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#a7f3d0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow filter -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#022c22" flood-opacity="0.5"/>
    </filter>
    <!-- Glow filter for star -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main coin with shadow -->
  <g filter="url(#shadow)">
    <!-- Outer rim -->
    <circle cx="256" cy="256" r="248" fill="url(#rimGrad)"/>
    <!-- Rim inner highlight -->
    <circle cx="256" cy="256" r="240" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0.4"/>
    <!-- Inner coin body -->
    <circle cx="256" cy="256" r="230" fill="url(#coinGrad)"/>
    <!-- Decorative rings -->
    <circle cx="256" cy="256" r="210" fill="none" stroke="#6ee7b7" stroke-width="1" opacity="0.2"/>
    <circle cx="256" cy="256" r="195" fill="none" stroke="#34d399" stroke-width="0.5" opacity="0.15"/>
    <!-- Dotted ring -->
    <circle cx="256" cy="256" r="220" fill="none" stroke="#34d399" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.25"/>
  </g>

  <!-- Shine/reflection overlay -->
  <circle cx="256" cy="256" r="230" fill="url(#shine)"/>

  <!-- Nova star burst (4-pointed) -->
  <g filter="url(#glow)">
    <path d="M256 100 C262 180, 256 200, 290 215 C256 200, 250 180, 256 100Z" fill="#a7f3d0" opacity="0.35"/>
    <path d="M256 412 C250 332, 256 312, 222 297 C256 312, 262 332, 256 412Z" fill="#a7f3d0" opacity="0.35"/>
    <path d="M100 256 C180 250, 200 256, 215 222 C200 256, 180 262, 100 256Z" fill="#a7f3d0" opacity="0.35"/>
    <path d="M412 256 C332 262, 312 256, 297 290 C312 256, 332 250, 412 256Z" fill="#a7f3d0" opacity="0.35"/>
  </g>

  <!-- Central glow behind N -->
  <circle cx="256" cy="256" r="70" fill="url(#starGlow)"/>

  <!-- Stylized "N" letter (NovaCoin) -->
  <g filter="url(#shadow)">
    <path d="M216 190 
             L216 322 
             L226 322 
             L226 240 
             L260 300 
             L268 300 
             L296 240 
             L296 322 
             L306 322 
             L306 190 
             L296 190 
             L268 252 
             L244 190 Z" 
          fill="url(#letterGrad)"/>
  </g>

  <!-- Small nova sparkles -->
  <g opacity="0.6">
    <circle cx="185" cy="205" r="4" fill="#a7f3d0" filter="url(#glow)"/>
    <circle cx="330" cy="195" r="3" fill="#a7f3d0" filter="url(#glow)"/>
    <circle cx="175" cy="300" r="3.5" fill="#a7f3d0" filter="url(#glow)"/>
    <circle cx="340" cy="315" r="2.5" fill="#a7f3d0" filter="url(#glow)"/>
    <circle cx="195" cy="172" r="2" fill="#ffffff" opacity="0.4"/>
    <circle cx="320" cy="170" r="2.5" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- Top arc text: NOVA -->
  <path d="M150 175 A130 130 0 0 1 362 175" fill="none" id="topArc"/>
  <text fill="#a7f3d0" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="40" letter-spacing="18" opacity="0.9">
    <textPath href="#topArc" startOffset="14%">NOVA</textPath>
  </text>

  <!-- Bottom arc text: COIN -->
  <path d="M150 337 A130 130 0 0 0 362 337" fill="none" id="bottomArc"/>
  <text fill="#6ee7b7" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="28" letter-spacing="14" opacity="0.7">
    <textPath href="#bottomArc" startOffset="18%">COIN</textPath>
  </text>

  <!-- Edge serrations (crypto coin feel) -->
  <g opacity="0.12" fill="#6ee7b7">
    <rect x="248" y="6" width="16" height="12" rx="2"/>
    <rect x="248" y="494" width="16" height="12" rx="2"/>
    <rect x="6" y="248" width="12" height="16" rx="2"/>
    <rect x="494" y="248" width="12" height="16" rx="2"/>
    <rect x="100" y="100" width="12" height="10" rx="2" transform="rotate(-45 106 105)"/>
    <rect x="400" y="100" width="12" height="10" rx="2" transform="rotate(45 406 105)"/>
    <rect x="100" y="402" width="12" height="10" rx="2" transform="rotate(45 106 407)"/>
    <rect x="400" y="402" width="12" height="10" rx="2" transform="rotate(-45 406 407)"/>
  </g>

  <!-- Bottom year -->
  <text x="256" y="485" text-anchor="middle" fill="#34d399" font-family="'Segoe UI', Arial, sans-serif" font-size="13" opacity="0.35" letter-spacing="6">2024</text>
</svg>
